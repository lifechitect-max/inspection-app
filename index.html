<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspect">
<meta name="theme-color" content="#0B1220">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Inspection Camera</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:#0B1220; color:#E5EAF2; overflow:hidden;
    position:fixed; inset:0; width:100%;
  }
  button { font-family:inherit; touch-action:manipulation; border:none; cursor:pointer; }
  .screen { position:absolute; inset:0; display:none; flex-direction:column; }
  .screen.active { display:flex; }
  .safe-top { padding-top:env(safe-area-inset-top); }
  .safe-bottom { padding-bottom:env(safe-area-inset-bottom); }

  /* ---------- Camera screen ---------- */
  #camScreen { background:#000; }
  #camWrap { position:absolute; inset:0; overflow:hidden; }
  #vid { width:100%; height:100%; object-fit:cover; transform-origin:center center; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity .25s; }
  #camError {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:16px;
    align-items:center; justify-content:center; text-align:center; padding:32px;
    background:#0B1220; z-index:2; /* below the top/bottom bars so Photos stays reachable */
  }
  #camError p { color:#93A3BC; font-size:16px; line-height:1.5; max-width:320px; }
  #camTop {
    position:absolute; top:0; left:0; right:0; z-index:3;
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(rgba(0,0,0,.55), transparent);
  }
  #camTop h1 { font-size:17px; font-weight:700; letter-spacing:.3px; }
  #camTop h1 span { color:#F59E0B; }
  #zoomRow {
    position:absolute; left:0; right:0; bottom:calc(env(safe-area-inset-bottom) + 128px);
    display:flex; justify-content:center; gap:14px; z-index:3; align-items:center;
  }
  .zoomBtn {
    width:44px; height:44px; border-radius:50%; font-size:24px; font-weight:600;
    background:rgba(0,0,0,.45); color:#fff; backdrop-filter:blur(6px);
  }
  #zoomLabel {
    min-width:64px; text-align:center; font-size:15px; font-weight:700;
    background:rgba(0,0,0,.45); border-radius:22px; padding:10px 0; backdrop-filter:blur(6px);
  }
  #camBottom {
    position:absolute; left:0; right:0; bottom:0; z-index:3;
    padding:14px 24px calc(env(safe-area-inset-bottom) + 18px);
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(transparent, rgba(0,0,0,.55));
  }
  #shutter {
    width:78px; height:78px; border-radius:50%; background:#fff;
    border:5px solid rgba(255,255,255,.35); background-clip:padding-box;
    transition:transform .1s;
  }
  #shutter:active { transform:scale(.9); }
  #galleryBtn {
    width:92px; padding:10px 0; border-radius:14px; background:rgba(0,0,0,.45);
    color:#fff; font-size:13px; font-weight:600; line-height:1.5; backdrop-filter:blur(6px);
  }
  #galleryBtn .d { color:#F87171; } #galleryBtn .g { color:#60A5FA; }
  #camSpacer { width:92px; text-align:center; color:rgba(255,255,255,.55); font-size:11px; line-height:1.4; }

  /* ---------- Note screen ---------- */
  #noteScreen { background:#0B1220; }
  #noteBody { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 16px; display:flex; flex-direction:column; gap:14px; }
  #notePhoto { width:100%; max-height:38vh; object-fit:contain; border-radius:14px; background:#000; }
  .catRow { display:flex; gap:12px; }
  .catBtn {
    flex:1; padding:16px 0; border-radius:14px; font-size:17px; font-weight:800;
    letter-spacing:.5px; background:#1A2436; color:#93A3BC; border:2px solid #253145;
  }
  #catDefect.sel { background:#7F1D1D; color:#fff; border-color:#EF4444; }
  #catGeneral.sel { background:#1E3A8A; color:#fff; border-color:#3B82F6; }
  #micBtn {
    width:84px; height:84px; border-radius:50%; margin:0 auto; display:flex;
    align-items:center; justify-content:center; font-size:36px;
    background:#1A2436; border:2px solid #253145; color:#fff;
  }
  #micBtn.on { background:#B91C1C; border-color:#EF4444; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 70%{box-shadow:0 0 0 18px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
  #micHint { text-align:center; color:#93A3BC; font-size:14px; min-height:20px; }
  #noteText {
    width:100%; min-height:90px; border-radius:14px; background:#1A2436; color:#E5EAF2;
    border:2px solid #253145; padding:12px 14px; font-size:17px; font-family:inherit; resize:none;
  }
  #noteText:focus { outline:none; border-color:#F59E0B; }
  #noteActions {
    display:flex; gap:12px; padding:12px 16px calc(env(safe-area-inset-bottom) + 14px);
    background:#0B1220; border-top:1px solid #1A2436;
  }
  #discardBtn { flex:1; padding:16px 0; border-radius:14px; background:#1A2436; color:#F87171; font-size:16px; font-weight:700; }
  #saveBtn { flex:2; padding:16px 0; border-radius:14px; background:#16A34A; color:#fff; font-size:17px; font-weight:800; }

  /* ---------- Gallery screen ---------- */
  #galleryScreen { background:#0B1220; }
  .topbar {
    display:flex; align-items:center; gap:8px;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
    background:#0F1729; border-bottom:1px solid #1A2436;
  }
  .topbar button.txt { background:none; color:#F59E0B; font-size:16px; font-weight:700; padding:10px; }
  .topbar h2 { flex:1; text-align:center; font-size:17px; }
  #propRow { padding:10px 16px 0; }
  #propName {
    width:100%; background:#1A2436; border:1px solid #253145; border-radius:12px;
    color:#E5EAF2; font-size:15px; padding:12px 14px; font-family:inherit;
  }
  #propName:focus { outline:none; border-color:#F59E0B; }
  #tabs { display:flex; gap:10px; padding:12px 16px; }
  .tab {
    flex:1; padding:12px 0; border-radius:12px; font-size:15px; font-weight:800;
    background:#1A2436; color:#93A3BC;
  }
  #tabDefects.sel { background:#7F1D1D; color:#fff; }
  #tabGeneral.sel { background:#1E3A8A; color:#fff; }
  #grid {
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:grid; grid-template-columns:repeat(3, 1fr); gap:4px; padding:0 16px 16px;
    align-content:start;
  }
  .cell { position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; background:#1A2436; border:none; padding:0; }
  .cell img { width:100%; height:100%; object-fit:cover; display:block; }
  .cell span {
    position:absolute; left:0; right:0; bottom:0; font-size:10px; color:#fff;
    background:rgba(0,0,0,.65); padding:3px 5px; text-align:left;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #emptyMsg { grid-column:1/-1; text-align:center; color:#5B6B84; padding:48px 24px; font-size:15px; line-height:1.6; }
  #galleryFooter { padding:10px 16px calc(env(safe-area-inset-bottom) + 12px); display:flex; gap:12px; }
  #exportBtn { flex:2; padding:15px 0; border-radius:14px; background:#F59E0B; color:#0B1220; font-size:16px; font-weight:800; }
  #newInspBtn { flex:1; padding:15px 0; border-radius:14px; background:#1A2436; color:#F87171; font-size:14px; font-weight:700; }

  /* ---------- Viewer screen ---------- */
  #viewScreen { background:#000; z-index:10; }
  #viewWrap { flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; touch-action:none; }
  #viewImg { max-width:100%; max-height:100%; transform-origin:center center; will-change:transform; }
  #viewTop {
    position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px; z-index:2;
    background:linear-gradient(rgba(0,0,0,.6), transparent);
  }
  #viewTop button { background:rgba(0,0,0,.4); color:#fff; font-size:15px; font-weight:700; padding:10px 16px; border-radius:12px; }
  #viewTop #viewDelete { color:#F87171; }
  #viewBottom {
    background:#0F1729; padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
    display:flex; flex-direction:column; gap:10px;
  }
  #viewNote { color:#E5EAF2; font-size:15px; line-height:1.4; }
  #viewNote .badge { font-weight:800; margin-right:6px; }
  #viewNoteEdit {
    width:100%; min-height:70px; border-radius:12px; background:#1A2436; color:#E5EAF2;
    border:2px solid #F59E0B; padding:10px 12px; font-size:16px; font-family:inherit; resize:none; display:none;
  }
  #viewBtns { display:flex; gap:10px; }
  #viewBtns button { flex:1; padding:12px 0; border-radius:12px; background:#1A2436; color:#E5EAF2; font-size:14px; font-weight:700; }

  /* ---------- Toast ---------- */
  #toast {
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 120px);
    background:#16A34A; color:#fff; font-size:15px; font-weight:700;
    padding:12px 22px; border-radius:24px; opacity:0; pointer-events:none;
    transition:opacity .3s; z-index:99; max-width:86%; text-align:center;
  }
  #toast.show { opacity:1; }
  #toast.err { background:#B91C1C; }
  .bigBtn { padding:14px 28px; border-radius:14px; background:#F59E0B; color:#0B1220; font-size:16px; font-weight:800; }
</style>
</head>
<body>

<!-- ============ CAMERA ============ -->
<div id="camScreen" class="screen active">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>
    <div id="flash"></div>
  </div>
  <div id="camError" hidden>
    <div style="font-size:52px">📷</div>
    <p id="camErrorMsg">Camera access is needed to take inspection photos.</p>
    <button class="bigBtn" id="retryCamBtn">Enable Camera</button>
  </div>
  <div id="camTop"><h1><span>●</span> Inspection Camera</h1></div>
  <div id="zoomRow">
    <button class="zoomBtn" id="zoomOut">−</button>
    <div id="zoomLabel">1.0×</div>
    <button class="zoomBtn" id="zoomIn">+</button>
  </div>
  <div id="camBottom">
    <button id="galleryBtn">Photos<br><span class="d">D: 0</span> · <span class="g">G: 0</span></button>
    <button id="shutter" aria-label="Take photo"></button>
    <div id="camSpacer">pinch to<br>zoom</div>
  </div>
</div>

<!-- ============ NOTE ============ -->
<div id="noteScreen" class="screen">
  <div id="noteBody" class="safe-top">
    <img id="notePhoto" alt="Captured photo">
    <div class="catRow">
      <button class="catBtn" id="catDefect">🔴 DEFECT</button>
      <button class="catBtn sel" id="catGeneral">🔵 GENERAL</button>
    </div>
    <button id="micBtn">🎤</button>
    <div id="micHint">Starting voice note…</div>
    <textarea id="noteText" placeholder="Say or type your note… e.g. “Defect, HVAC not cooling properly”"></textarea>
  </div>
  <div id="noteActions">
    <button id="discardBtn">Discard</button>
    <button id="saveBtn">Save Photo</button>
  </div>
</div>

<!-- ============ GALLERY ============ -->
<div id="galleryScreen" class="screen">
  <div class="topbar">
    <button class="txt" id="backToCam">‹ Camera</button>
    <h2>Inspection Photos</h2>
    <button class="txt" id="exportTop" style="visibility:hidden">.</button>
  </div>
  <div id="propRow"><input id="propName" placeholder="Property address (used in export file name)"></div>
  <div id="tabs">
    <button class="tab sel" id="tabDefects">🔴 Defects (0)</button>
    <button class="tab" id="tabGeneral">🔵 General (0)</button>
  </div>
  <div id="grid"></div>
  <div id="galleryFooter">
    <button id="newInspBtn">New Inspection</button>
    <button id="exportBtn">⬇︎ Export All</button>
  </div>
</div>

<!-- ============ VIEWER ============ -->
<div id="viewScreen" class="screen">
  <div id="viewTop">
    <button id="viewClose">‹ Back</button>
    <button id="viewDelete">Delete</button>
  </div>
  <div id="viewWrap"><img id="viewImg" alt="Photo"></div>
  <div id="viewBottom">
    <div id="viewNote"></div>
    <textarea id="viewNoteEdit"></textarea>
    <div id="viewBtns">
      <button id="viewMove">Move</button>
      <button id="viewEdit">Edit Note</button>
      <button id="viewShare">Share</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);

/* ================= State ================= */
let db = null;
let photos = [];            // in-memory copy of all saved photos (blob + meta)
let pending = null;         // photo captured but not yet saved
let currentCat = 'general'; // category selected on note screen
let galleryTab = 'defect';
let viewingId = null;

/* ================= IndexedDB ================= */
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('inspectionDB', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('photos', { keyPath: 'id' });
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = () => rej(r.error);
  });
}
const store = mode => db.transaction('photos', mode).objectStore('photos');
const dbPut = p  => new Promise((res, rej) => { const r = store('readwrite').put(p);    r.onsuccess = res; r.onerror = () => rej(r.error); });
const dbAll = () => new Promise((res, rej) => { const r = store('readonly').getAll();   r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const dbDel = id => new Promise((res, rej) => { const r = store('readwrite').delete(id); r.onsuccess = res; r.onerror = () => rej(r.error); });
const dbClear = () => new Promise((res, rej) => { const r = store('readwrite').clear(); r.onsuccess = res; r.onerror = () => rej(r.error); });

/* ================= Screens / toast ================= */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
let toastTimer = null;
function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2200);
}

/* ================= Camera ================= */
let stream = null, videoTrack = null;
let zoom = 1, minZoom = 1, maxZoom = 6, nativeZoom = false;
const vid = $('vid');

async function startCam() {
  stopCam();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 2560 }, height: { ideal: 1440 } },
      audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    videoTrack = stream.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
    if (caps.zoom && typeof caps.zoom.max === 'number') {
      nativeZoom = true;
      minZoom = Math.max(1, caps.zoom.min || 1);
      maxZoom = Math.min(caps.zoom.max, 8);
    } else {
      nativeZoom = false; minZoom = 1; maxZoom = 6;
    }
    setZoom(1);
    $('camError').hidden = true;
  } catch (e) {
    $('camError').hidden = false;
    $('camErrorMsg').textContent =
      'Camera is blocked or unavailable. Tap below, then allow camera access when asked. ' +
      '(If it stays blocked: iPhone Settings → Apps → Safari → Camera → Allow.)';
  }
}
function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; videoTrack = null; }
}
function setZoom(z) {
  zoom = Math.min(maxZoom, Math.max(minZoom, z));
  if (nativeZoom && videoTrack) {
    videoTrack.applyConstraints({ advanced: [{ zoom }] }).catch(() => {});
    vid.style.transform = '';
  } else {
    vid.style.transform = zoom > 1 ? `scale(${zoom})` : '';
  }
  $('zoomLabel').textContent = zoom.toFixed(1) + '×';
}
$('zoomIn').onclick  = () => setZoom(zoom + 0.5);
$('zoomOut').onclick = () => setZoom(zoom - 0.5);
$('retryCamBtn').onclick = startCam;

/* pinch to zoom on the live camera */
let pinchDist = 0, pinchZoomStart = 1;
const dist = t => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
$('camWrap').addEventListener('touchstart', e => {
  if (e.touches.length === 2) { pinchDist = dist(e.touches); pinchZoomStart = zoom; }
});
$('camWrap').addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchDist > 0) {
    e.preventDefault();
    setZoom(pinchZoomStart * dist(e.touches) / pinchDist);
  }
}, { passive: false });

/* capture */
$('shutter').onclick = () => {
  if (!stream || !vid.videoWidth) { toast('Camera not ready', true); return; }
  const f = $('flash');
  f.style.opacity = .8; setTimeout(() => f.style.opacity = 0, 120);

  const vw = vid.videoWidth, vh = vid.videoHeight;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (!nativeZoom && zoom > 1) {            // digital zoom: crop the center
    sw = vw / zoom; sh = vh / zoom;
    sx = (vw - sw) / 2; sy = (vh - sh) / 2;
  }
  const c = document.createElement('canvas');
  c.width = Math.round(sw); c.height = Math.round(sh);
  c.getContext('2d').drawImage(vid, sx, sy, sw, sh, 0, 0, c.width, c.height);
  c.toBlob(blob => {
    if (!blob) { toast('Capture failed, try again', true); return; }
    pending = { id: Date.now() + '-' + Math.floor(Math.random() * 1e6), blob, ts: Date.now() };
    openNoteScreen();
  }, 'image/jpeg', 0.88);
};

/* ================= Note screen (voice + text) ================= */
let noteURL = null;
function openNoteScreen() {
  if (noteURL) URL.revokeObjectURL(noteURL);
  noteURL = URL.createObjectURL(pending.blob);
  $('notePhoto').src = noteURL;
  $('noteText').value = '';
  setCat('general');
  show('noteScreen');
  startListening(true);
}
function setCat(c) {
  currentCat = c;
  $('catDefect').classList.toggle('sel', c === 'defect');
  $('catGeneral').classList.toggle('sel', c === 'general');
}
$('catDefect').onclick  = () => setCat('defect');
$('catGeneral').onclick = () => setCat('general');

/* leading keyword decides the category and is stripped from the note:
   "Defect, HVAC not cooling"  -> defect / "HVAC not cooling"
   "General picture, guest bedroom 1" -> general / "guest bedroom 1" */
function parseNote(t) {
  const s = t.trim();
  let m = s.match(/^(defects?|deffects?)\s*(picture|photo|pic)?\s*[,.:;\-]*\s*/i);
  if (m) return { cat: 'defect', note: s.slice(m[0].length) };
  m = s.match(/^general\s*(picture|photo|pic)?\s*[,.:;\-]*\s*/i);
  if (m) return { cat: 'general', note: s.slice(m[0].length) };
  return { cat: null, note: s };
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, sessionBase = '';

function startListening(auto) {
  if (!SR) {
    $('micHint').textContent = 'Tap the note box and use the 🎤 key on your keyboard to dictate.';
    return;
  }
  if (listening) return;
  sessionBase = $('noteText').value.trim();
  rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;
  rec.onresult = e => {
    let text = '';
    for (const r of e.results) text += r[0].transcript;
    const p = parseNote(text);
    if (p.cat) setCat(p.cat);
    $('noteText').value = (sessionBase ? sessionBase + ' ' : '') + p.note;
  };
  rec.onend = () => {
    listening = false;
    $('micBtn').classList.remove('on');
    $('micHint').textContent = 'Tap the mic to add more, or edit the note below.';
  };
  rec.onerror = () => {
    listening = false;
    $('micBtn').classList.remove('on');
    $('micHint').textContent = auto
      ? 'Tap the mic to speak, or type / dictate with the keyboard 🎤.'
      : 'Voice didn’t start — use the keyboard 🎤 key to dictate.';
  };
  try {
    rec.start();
    listening = true;
    $('micBtn').classList.add('on');
    $('micHint').textContent = 'Listening… say “Defect, …” or “General, …”';
  } catch (e) { /* already started or blocked */ }
}
function stopListening() { if (rec) { try { rec.stop(); } catch (e) {} } listening = false; $('micBtn').classList.remove('on'); }
$('micBtn').onclick = () => listening ? stopListening() : startListening(false);

/* typing a keyword also flips the category */
$('noteText').addEventListener('input', () => {
  const p = parseNote($('noteText').value);
  if (p.cat) setCat(p.cat);
});

$('saveBtn').onclick = async () => {
  stopListening();
  const p = parseNote($('noteText').value);   // strip keyword if user typed it
  pending.cat = p.cat || currentCat;
  pending.note = p.note || $('noteText').value.trim();
  try {
    await dbPut(pending);
    photos.push(pending);
    const n = photos.filter(x => x.cat === pending.cat).length;
    toast(`Saved to ${pending.cat === 'defect' ? 'Defects' : 'General'} (${n})`);
  } catch (e) {
    toast('Could not save photo!', true);
  }
  pending = null;
  updateCounts();
  show('camScreen');
};
$('discardBtn').onclick = () => {
  stopListening();
  pending = null;
  show('camScreen');
};

/* ================= Gallery ================= */
let gridURLs = [];
function updateCounts() {
  const d = photos.filter(p => p.cat === 'defect').length;
  const g = photos.length - d;
  $('galleryBtn').innerHTML = `Photos<br><span class="d">D: ${d}</span> · <span class="g">G: ${g}</span>`;
  $('tabDefects').textContent = `🔴 Defects (${d})`;
  $('tabGeneral').textContent = `🔵 General (${g})`;
}
function openGallery() { updateCounts(); renderGrid(); show('galleryScreen'); }
function renderGrid() {
  gridURLs.forEach(u => URL.revokeObjectURL(u)); gridURLs = [];
  const grid = $('grid');
  grid.innerHTML = '';
  const list = photos.filter(p => p.cat === galleryTab).sort((a, b) => b.ts - a.ts);
  if (!list.length) {
    grid.innerHTML = `<div id="emptyMsg">No ${galleryTab === 'defect' ? 'defect' : 'general'} photos yet.<br>Take a photo and say “${galleryTab === 'defect' ? 'Defect, …' : 'General, …'}”</div>`;
    return;
  }
  for (const p of list) {
    const u = URL.createObjectURL(p.blob); gridURLs.push(u);
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.innerHTML = `<img src="${u}" alt=""><span>${escapeHTML(p.note || 'no note')}</span>`;
    cell.onclick = () => openViewer(p.id);
    grid.appendChild(cell);
  }
}
const escapeHTML = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
$('galleryBtn').onclick = () => { stopCam(); openGallery(); };
$('backToCam').onclick = () => { show('camScreen'); startCam(); };
$('tabDefects').onclick = () => { galleryTab = 'defect';  $('tabDefects').classList.add('sel'); $('tabGeneral').classList.remove('sel'); renderGrid(); };
$('tabGeneral').onclick = () => { galleryTab = 'general'; $('tabGeneral').classList.add('sel'); $('tabDefects').classList.remove('sel'); renderGrid(); };

$('propName').value = localStorage.getItem('propName') || '';
$('propName').addEventListener('input', () => localStorage.setItem('propName', $('propName').value));

$('newInspBtn').onclick = async () => {
  if (!photos.length) { toast('Nothing to clear'); return; }
  if (!confirm(`Delete all ${photos.length} photos and start a new inspection?\n\nExport first if you haven't!`)) return;
  await dbClear();
  photos = [];
  localStorage.removeItem('propName');
  $('propName').value = '';
  updateCounts(); renderGrid();
  toast('New inspection started');
};

/* ================= Viewer (pinch zoom) ================= */
let viewURL = null, vz = 1, vx = 0, vy = 0;
let vPinchDist = 0, vzStart = 1, vPanStart = null, lastTap = 0;
const viewImg = $('viewImg');

function applyView() { viewImg.style.transform = `translate(${vx}px, ${vy}px) scale(${vz})`; }
function resetView() { vz = 1; vx = 0; vy = 0; applyView(); }

function openViewer(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  viewingId = id;
  if (viewURL) URL.revokeObjectURL(viewURL);
  viewURL = URL.createObjectURL(p.blob);
  viewImg.src = viewURL;
  resetView();
  renderViewMeta(p);
  $('viewNoteEdit').style.display = 'none';
  $('viewNote').style.display = '';
  show('viewScreen');
}
function renderViewMeta(p) {
  const badge = p.cat === 'defect'
    ? '<span class="badge" style="color:#F87171">🔴 DEFECT</span>'
    : '<span class="badge" style="color:#60A5FA">🔵 GENERAL</span>';
  $('viewNote').innerHTML = badge + escapeHTML(p.note || 'No note') +
    `<div style="color:#5B6B84;font-size:12px;margin-top:4px">${new Date(p.ts).toLocaleString()}</div>`;
  $('viewMove').textContent = p.cat === 'defect' ? '→ General' : '→ Defects';
}
$('viewClose').onclick = () => { show('galleryScreen'); renderGrid(); updateCounts(); };
$('viewDelete').onclick = async () => {
  if (!confirm('Delete this photo?')) return;
  await dbDel(viewingId);
  photos = photos.filter(p => p.id !== viewingId);
  toast('Photo deleted');
  show('galleryScreen'); renderGrid(); updateCounts();
};
$('viewMove').onclick = async () => {
  const p = photos.find(x => x.id === viewingId);
  p.cat = p.cat === 'defect' ? 'general' : 'defect';
  await dbPut(p);
  renderViewMeta(p);
  toast(`Moved to ${p.cat === 'defect' ? 'Defects' : 'General'}`);
};
$('viewEdit').onclick = async () => {
  const p = photos.find(x => x.id === viewingId);
  const ta = $('viewNoteEdit');
  if (ta.style.display === 'none') {
    ta.value = p.note || '';
    ta.style.display = 'block';
    $('viewNote').style.display = 'none';
    $('viewEdit').textContent = 'Save Note';
    ta.focus();
  } else {
    p.note = ta.value.trim();
    await dbPut(p);
    ta.style.display = 'none';
    $('viewNote').style.display = '';
    $('viewEdit').textContent = 'Edit Note';
    renderViewMeta(p);
    toast('Note updated');
  }
};
$('viewShare').onclick = async () => {
  const p = photos.find(x => x.id === viewingId);
  const file = new File([p.blob], fileNameFor(p, 1), { type: 'image/jpeg' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); } catch (e) { /* user cancelled */ }
  } else {
    downloadBlob(p.blob, file.name);
  }
};

/* pinch zoom / pan / double-tap in the viewer */
const vw2 = $('viewWrap');
vw2.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    vPinchDist = dist(e.touches); vzStart = vz; vPanStart = null;
  } else if (e.touches.length === 1) {
    const now = Date.now();
    if (now - lastTap < 300) {                       // double tap: toggle zoom
      if (vz > 1) resetView(); else { vz = 2.5; applyView(); }
    }
    lastTap = now;
    vPanStart = { x: e.touches[0].clientX - vx, y: e.touches[0].clientY - vy };
  }
});
vw2.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && vPinchDist > 0) {
    vz = Math.min(6, Math.max(1, vzStart * dist(e.touches) / vPinchDist));
    if (vz === 1) { vx = 0; vy = 0; }
    applyView();
  } else if (e.touches.length === 1 && vPanStart && vz > 1) {
    vx = e.touches[0].clientX - vPanStart.x;
    vy = e.touches[0].clientY - vPanStart.y;
    applyView();
  }
}, { passive: false });

/* ================= Export (ZIP with two folders) ================= */
function sanitize(s) {
  return (s || '').replace(/[\\/:*?"<>|#%{}$!'@+`=]/g, '').replace(/\s+/g, ' ').trim().slice(0, 60);
}
function fileNameFor(p, idx) {
  const n = sanitize(p.note) || 'photo';
  return String(idx).padStart(3, '0') + ' - ' + n + '.jpg';
}
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
/* minimal ZIP writer (files stored uncompressed — JPEGs are already compressed) */
function buildZip(files) {
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  const now = new Date();
  const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1);
  const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();
  for (const f of files) {
    const name = enc.encode(f.name);
    const crc = crc32(f.data);
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true); lh.setUint16(6, 0x0800, true);
    lh.setUint16(8, 0, true); lh.setUint16(10, dosTime, true); lh.setUint16(12, dosDate, true);
    lh.setUint32(14, crc, true); lh.setUint32(18, f.data.length, true); lh.setUint32(22, f.data.length, true);
    lh.setUint16(26, name.length, true); lh.setUint16(28, 0, true);
    parts.push(new Uint8Array(lh.buffer), name, f.data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true); ch.setUint16(4, 20, true); ch.setUint16(6, 20, true);
    ch.setUint16(8, 0x0800, true); ch.setUint16(10, 0, true); ch.setUint16(12, dosTime, true);
    ch.setUint16(14, dosDate, true); ch.setUint32(16, crc, true);
    ch.setUint32(20, f.data.length, true); ch.setUint32(24, f.data.length, true);
    ch.setUint16(28, name.length, true); ch.setUint32(42, offset, true);
    central.push(new Uint8Array(ch.buffer), name);
    offset += 30 + name.length + f.data.length;
  }
  let cdSize = 0;
  for (const c of central) cdSize += c.length;
  const end = new DataView(new ArrayBuffer(22));
  end.setUint32(0, 0x06054b50, true);
  end.setUint16(8, files.length, true); end.setUint16(10, files.length, true);
  end.setUint32(12, cdSize, true); end.setUint32(16, offset, true);
  return new Blob([...parts, ...central, new Uint8Array(end.buffer)], { type: 'application/zip' });
}
function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);
}
$('exportBtn').onclick = async () => {
  if (!photos.length) { toast('No photos to export', true); return; }
  $('exportBtn').textContent = 'Building…';
  try {
    const prop = sanitize($('propName').value) || 'Inspection';
    const dateStr = new Date().toISOString().slice(0, 10);
    const files = [];
    let report = `INSPECTION REPORT — ${prop}\nDate: ${new Date().toLocaleString()}\n`;
    for (const [folder, cat, label] of [['Defects', 'defect', 'DEFECTS'], ['General Photos', 'general', 'GENERAL PHOTOS']]) {
      const list = photos.filter(p => p.cat === cat).sort((a, b) => a.ts - b.ts);
      report += `\n========== ${label} (${list.length}) ==========\n`;
      let i = 1;
      for (const p of list) {
        const fname = fileNameFor(p, i);
        files.push({ name: folder + '/' + fname, data: new Uint8Array(await p.blob.arrayBuffer()) });
        report += `${String(i).padStart(3, '0')}. ${p.note || '(no note)'}  [${new Date(p.ts).toLocaleString()}]\n`;
        i++;
      }
    }
    files.push({ name: 'report.txt', data: new TextEncoder().encode(report) });
    const zip = buildZip(files);
    const zipName = `${prop} - ${dateStr}.zip`;
    const zipFile = new File([zip], zipName, { type: 'application/zip' });
    if (navigator.canShare && navigator.canShare({ files: [zipFile] })) {
      try { await navigator.share({ files: [zipFile], title: zipName }); }
      catch (e) { /* user cancelled the share sheet */ }
    } else {
      downloadBlob(zip, zipName);
    }
  } catch (e) {
    toast('Export failed: ' + e.message, true);
  }
  $('exportBtn').textContent = '⬇︎ Export All';
};

/* ================= Boot ================= */
(async function init() {
  await openDB();
  photos = await dbAll();
  updateCounts();
  startCam();
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && $('camScreen').classList.contains('active')) startCam();
  else if (document.visibilityState === 'hidden') stopCam();
});
</script>
