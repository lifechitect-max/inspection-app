<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspect">
<meta name="theme-color" content="#0B1220">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Inspection Camera</title>
<!-- Google Identity Services for Drive OAuth -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:#0B1220; color:#E5EAF2; overflow:hidden;
    position:fixed; inset:0; width:100%;
  }
  button { font-family:inherit; touch-action:manipulation; border:none; cursor:pointer; }
  .screen { position:absolute; inset:0; display:none; flex-direction:column; }
  .screen.active { display:flex; }
  .safe-top { padding-top:env(safe-area-inset-top); }
  .safe-bottom { padding-bottom:env(safe-area-inset-bottom); }

  /* ---------- Camera screen ---------- */
  #camScreen { background:#000; }
  #camWrap { position:absolute; inset:0; overflow:hidden; }
  #vid { width:100%; height:100%; object-fit:cover; transform-origin:center center; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity .25s; }
  #camHint {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:12px;
    align-items:center; justify-content:center; text-align:center; padding:32px;
    background:rgba(11,18,32,.55); z-index:2; pointer-events:none;
  }
  #camHint p { color:#E5EAF2; font-size:16px; line-height:1.5; max-width:320px; white-space:pre-line; }
  #camTop {
    position:absolute; top:0; left:0; right:0; z-index:3;
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(rgba(0,0,0,.55), transparent);
  }
  #camTop h1 { font-size:17px; font-weight:700; letter-spacing:.3px; }
  #camTop h1 span { color:#F59E0B; }
  #ver { font-size:11px; color:rgba(255,255,255,.45); font-weight:600; margin-left:6px; }
  #addrLabel { font-size:12px; color:#F59E0B; margin-top:2px; font-weight:600; }
  #zoomChips {
    position:absolute; left:0; right:0; bottom:calc(env(safe-area-inset-bottom) + 128px);
    display:flex; justify-content:center; gap:10px; z-index:3; align-items:center;
  }
  .chip {
    min-width:46px; height:46px; padding:0 12px; border-radius:23px;
    background:rgba(0,0,0,.5); color:#fff; font-size:14px; font-weight:700;
    backdrop-filter:blur(6px); border:1.5px solid transparent; transition:transform .15s;
  }
  .chip.sel { color:#F59E0B; border-color:rgba(245,158,11,.6); transform:scale(1.12); }
  #camBottom {
    position:absolute; left:0; right:0; bottom:0; z-index:3;
    padding:14px 24px calc(env(safe-area-inset-bottom) + 18px);
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(transparent, rgba(0,0,0,.55));
  }
  #shutter {
    width:78px; height:78px; border-radius:50%; background:#fff;
    border:5px solid rgba(255,255,255,.35); background-clip:padding-box;
    transition:transform .1s;
  }
  #shutter:active { transform:scale(.9); }
  #galleryBtn {
    width:92px; padding:10px 0; border-radius:14px; background:rgba(0,0,0,.45);
    color:#fff; font-size:13px; font-weight:600; line-height:1.5; backdrop-filter:blur(6px);
  }
  #galleryBtn .d { color:#F87171; } #galleryBtn .g { color:#60A5FA; }
  #camRightSpace { width:92px; }

  /* ---------- Note screen ---------- */
  #noteScreen { background:#0B1220; }
  #noteBody { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 16px; display:flex; flex-direction:column; gap:14px; }
  #notePhoto { width:100%; max-height:38vh; object-fit:contain; border-radius:14px; background:#000; }
  .catRow { display:flex; gap:12px; }
  .catBtn {
    flex:1; padding:16px 0; border-radius:14px; font-size:17px; font-weight:800;
    letter-spacing:.5px; background:#1A2436; color:#93A3BC; border:2px solid #253145;
  }
  #catDefect.sel { background:#7F1D1D; color:#fff; border-color:#EF4444; }
  #catGeneral.sel { background:#1E3A8A; color:#fff; border-color:#3B82F6; }
  #micBtn {
    width:84px; height:84px; border-radius:50%; margin:0 auto; display:flex;
    align-items:center; justify-content:center; font-size:36px;
    background:#1A2436; border:2px solid #253145; color:#fff;
  }
  #micBtn.on { background:#B91C1C; border-color:#EF4444; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 70%{box-shadow:0 0 0 18px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
  #micHint { text-align:center; color:#93A3BC; font-size:14px; min-height:20px; }
  #noteText {
    width:100%; min-height:90px; border-radius:14px; background:#1A2436; color:#E5EAF2;
    border:2px solid #253145; padding:12px 14px; font-size:17px; font-family:inherit; resize:none;
  }
  #noteText:focus { outline:none; border-color:#F59E0B; }
  #noteActions {
    display:flex; gap:12px; padding:12px 16px calc(env(safe-area-inset-bottom) + 14px);
    background:#0B1220; border-top:1px solid #1A2436;
  }
  #discardBtn { flex:1; padding:16px 0; border-radius:14px; background:#1A2436; color:#F87171; font-size:16px; font-weight:700; }
  #saveBtn { flex:2; padding:16px 0; border-radius:14px; background:#16A34A; color:#fff; font-size:17px; font-weight:800; }

  /* ---------- Gallery screen ---------- */
  #galleryScreen { background:#0B1220; }
  .topbar {
    display:flex; align-items:center; gap:8px;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
    background:#0F1729; border-bottom:1px solid #1A2436;
  }
  .topbar button.txt { background:none; color:#F59E0B; font-size:16px; font-weight:700; padding:10px; }
  .topbar h2 { flex:1; text-align:center; font-size:17px; }
  #propRow { padding:10px 16px 0; }
  #propName {
    width:100%; background:#1A2436; border:1px solid #253145; border-radius:12px;
    color:#E5EAF2; font-size:15px; padding:12px 14px; font-family:inherit;
  }
  #propName:focus { outline:none; border-color:#F59E0B; }
  #autoSaveRow {
    display:flex; gap:10px; align-items:center; padding:10px 18px 0;
    color:#93A3BC; font-size:13px; line-height:1.3;
  }
  #autoSaveRow input { width:20px; height:20px; accent-color:#F59E0B; flex-shrink:0; }
  #tabs { display:flex; gap:10px; padding:12px 16px; }
  .tab {
    flex:1; padding:12px 0; border-radius:12px; font-size:15px; font-weight:800;
    background:#1A2436; color:#93A3BC;
  }
  #tabDefects.sel { background:#7F1D1D; color:#fff; }
  #tabGeneral.sel { background:#1E3A8A; color:#fff; }
  #grid {
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:grid; grid-template-columns:repeat(3, 1fr); gap:4px; padding:0 16px 16px;
    align-content:start;
  }
  .cell { position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; background:#1A2436; border:none; padding:0; }
  .cell img { width:100%; height:100%; object-fit:cover; display:block; }
  .cell span {
    position:absolute; left:0; right:0; bottom:0; font-size:10px; color:#fff;
    background:rgba(0,0,0,.65); padding:3px 5px; text-align:left;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #emptyMsg { grid-column:1/-1; text-align:center; color:#5B6B84; padding:48px 24px; font-size:15px; line-height:1.6; }
  #galleryFooter { padding:10px 16px calc(env(safe-area-inset-bottom) + 12px); display:flex; gap:12px; }
  #exportBtn { flex:1.2; padding:15px 0; border-radius:14px; background:#F59E0B; color:#0B1220; font-size:14px; font-weight:800; }
  #newInspBtn { flex:0.8; padding:15px 0; border-radius:14px; background:#1A2436; color:#F87171; font-size:13px; font-weight:700; }
  #saveAllBtn { flex:1.4; padding:15px 0; border-radius:14px; background:#1E3A8A; color:#fff; font-size:14px; font-weight:800; }

  /* ---------- New-inspection address modal ---------- */
  #addrModal { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:50; display:flex; align-items:center; justify-content:center; padding:24px; }
  #addrModal[hidden] { display:none; }
  #addrBox {
    background:#131C2E; border:1px solid #253145; border-radius:16px; padding:20px;
    width:100%; max-width:360px; display:flex; flex-direction:column; gap:12px;
  }
  #addrBox h3 { font-size:18px; }
  #addrBox p { color:#93A3BC; font-size:14px; line-height:1.45; }
  #addrInput {
    background:#1A2436; border:2px solid #253145; border-radius:12px;
    padding:12px 14px; color:#E5EAF2; font-size:16px; font-family:inherit;
  }
  #addrInput:focus { outline:none; border-color:#F59E0B; }
  #addrBtns { display:flex; gap:10px; }
  #addrSkip { flex:1; padding:13px 0; border-radius:12px; background:#1A2436; color:#93A3BC; font-weight:700; }
  #addrStart { flex:2; padding:13px 0; border-radius:12px; background:#F59E0B; color:#0B1220; font-weight:800; }

  /* ---------- Viewer screen ---------- */
  #viewScreen { background:#000; z-index:10; }
  #viewWrap { flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; touch-action:none; }
  #viewImg { max-width:100%; max-height:100%; transform-origin:center center; will-change:transform; }
  #viewTop {
    position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 8px) 12px 8px; z-index:2;
    background:linear-gradient(rgba(0,0,0,.6), transparent);
  }
  #viewTop button { background:rgba(0,0,0,.4); color:#fff; font-size:15px; font-weight:700; padding:10px 16px; border-radius:12px; }
  #viewTop #viewDelete { color:#F87171; }
  #viewBottom {
    background:#0F1729; padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
    display:flex; flex-direction:column; gap:10px;
  }
  #viewNote { color:#E5EAF2; font-size:15px; line-height:1.4; }
  #viewNote .badge { font-weight:800; margin-right:6px; }
  #viewNoteEdit {
    width:100%; min-height:70px; border-radius:12px; background:#1A2436; color:#E5EAF2;
    border:2px solid #F59E0B; padding:10px 12px; font-size:16px; font-family:inherit; resize:none; display:none;
  }
  #viewBtns { display:flex; gap:10px; }
  #viewBtns button { flex:1; padding:12px 0; border-radius:12px; background:#1A2436; color:#E5EAF2; font-size:14px; font-weight:700; }

  /* ---------- Toast ---------- */
  #toast {
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 120px);
    background:#16A34A; color:#fff; font-size:15px; font-weight:700;
    padding:12px 22px; border-radius:24px; opacity:0; pointer-events:none;
    transition:opacity .3s; z-index:99; max-width:86%; text-align:center;
  }
  #toast.show { opacity:1; }
  #toast.err { background:#B91C1C; }
  .bigBtn { padding:14px 28px; border-radius:14px; background:#F59E0B; color:#0B1220; font-size:16px; font-weight:800; }
</style>

<body>

<!-- ============ CAMERA ============ -->
<div id="camScreen" class="screen active">
  <div id="camWrap">
    <video id="vid" autoplay playsinline muted></video>
    <div id="flash"></div>
  </div>
  <div id="camHint">
    <div style="font-size:44px">📷</div>
    <p id="camHintMsg">Starting camera…</p>
  </div>
  <div id="camTop">
    <div>
      <h1><span>●</span> Inspection Camera <small id="ver"></small></h1>
      <div id="addrLabel"></div>
    </div>
    <!-- Google Drive sign-in button. Visible when not connected to Drive. -->
    <button id="googleDriveBtn" style="background:none;border:1px solid #F59E0B;color:#F59E0B;padding:6px 8px;border-radius:6px;font-size:12px;">
      Drive
    </button>
  </div>
  <div id="zoomChips">
    <button class="chip" id="chipHalf" hidden>.5</button>
    <button class="chip sel" id="chipOne">1×</button>
    <button class="chip" id="chipThree">3</button>
  </div>
  <div id="camBottom">
    <button id="galleryBtn">Photos<br><span class="d">D: 0</span> · <span class="g">G: 0</span></button>
    <button id="shutter" aria-label="Take photo"></button>
    <div id="camRightSpace"></div>
  </div>
</div>

<!-- ============ NOTE ============ -->
<div id="noteScreen" class="screen">
  <div id="noteBody" class="safe-top">
    <img id="notePhoto" alt="Captured photo">
    <div class="catRow">
      <button class="catBtn" id="catDefect">🔴 DEFECT</button>
      <button class="catBtn sel" id="catGeneral">🔵 GENERAL</button>
    </div>
    <button id="micBtn">🎤</button>
    <div id="micHint">Starting voice note…</div>
    <textarea id="noteText" placeholder="Say or type your note… e.g. “Defect, HVAC not cooling properly”"></textarea>
  </div>
  <div id="noteActions">
    <button id="discardBtn">Discard</button>
    <button id="saveBtn">Save Photo</button>
  </div>
</div>

<!-- ============ GALLERY ============ -->
<div id="galleryScreen" class="screen">
  <div class="topbar">
    <button class="txt" id="backToCam">‹ Camera</button>
    <h2>Inspection Photos</h2>
    <button class="txt" id="exportTop" style="visibility:hidden">.</button>
  </div>
  <div id="propRow"><input id="propName" placeholder="Property address (used in export file name)"></div>
  <label id="autoSaveRow">
    <input type="checkbox" id="autoSaveChk">
    Offer “Save Image” to your gallery after every photo
  </label>
  <div id="tabs">
    <button class="tab sel" id="tabDefects">🔴 Defects (0)</button>
    <button class="tab" id="tabGeneral">🔵 General (0)</button>
  </div>
  <div id="grid"></div>
  <div id="galleryFooter">
    <button id="newInspBtn">New</button>
    <button id="saveAllBtn">📱 Save to Phone</button>
    <button id="driveBackupBtn">⇧ Drive</button>
    <button id="exportBtn">⬇︎ ZIP</button>
  </div>
</div>

<!-- ============ VIEWER ============ -->
<div id="viewScreen" class="screen">
  <div id="viewTop">
    <button id="viewClose">‹ Back</button>
    <button id="viewDelete">Delete</button>
  </div>
  <div id="viewWrap"><img id="viewImg" alt="Photo"></div>
  <div id="viewBottom">
    <div id="viewNote"></div>
    <textarea id="viewNoteEdit"></textarea>
    <div id="viewBtns">
      <button id="viewMove">Move</button>
      <button id="viewEdit">Edit Note</button>
      <button id="viewShare">Share</button>
    </div>
  </div>
</div>

<div id="addrModal" hidden>
  <div id="addrBox">
    <h3>🏠 New Inspection</h3>
    <p>Enter the property address. It labels this inspection — it appears on the camera screen, in every photo's file name, and on the export.</p>
    <input id="addrInput" placeholder="123 Main St" autocomplete="off">
    <div id="addrBtns">
      <button id="addrSkip">Skip</button>
      <button id="addrStart">Start Inspection</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const APP_VERSION = 'v7';

/* ================= State ================= */
let db = null;
let photos = [];            // in-memory copy of all saved photos (blob + meta)
let pending = null;         // photo captured but not yet saved
let currentCat = 'general'; // category selected on note screen
let galleryTab = 'defect';
let viewingId = null;

/* ================= IndexedDB ================= */
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('inspectionDB', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('photos', { keyPath: 'id' });
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = () => rej(r.error);
  });
}
const store = mode => db.transaction('photos', mode).objectStore('photos');
const dbPut = p  => new Promise((res, rej) => { const r = store('readwrite').put(p);    r.onsuccess = res; r.onerror = () => rej(r.error); });
const dbAll = () => new Promise((res, rej) => { const r = store('readonly').getAll();   r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const dbDel = id => new Promise((res, rej) => { const r = store('readwrite').delete(id); r.onsuccess = res; r.onerror = () => rej(r.error); });
const dbClear = () => new Promise((res, rej) => { const r = store('readwrite').clear(); r.onsuccess = res; r.onerror = () => rej(r.error); });

/* ================= Screens / toast ================= */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
let toastTimer = null;
function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2200);
}

/* ================= Camera ================= */
let stream = null, videoTrack = null, capsZoom = null;
let camToken = 0, camStarting = false;
let effZoom = 1;                  // zoom the user sees (0.5 = ultra-wide view)
let digitalZoom = 1;              // extra CSS/crop zoom on top of native zoom
let lenses = [];                  // usable back lenses, sorted by base zoom
let lensIdx = -1;                 // -1 = default back camera
const vid = $('vid');
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

/**
 * Show or hide the camera hint overlay. Safari’s handling of the `hidden`
 * attribute can be unreliable, especially when combined with flexbox
 * layouts. Instead of toggling the `hidden` attribute, explicitly
 * control the overlay’s display style. When a message is provided we
 * ensure the hint container is visible and update its text; when the
 * message is falsy we hide the overlay completely and clear any stale
 * text. This prevents the "Starting camera…" overlay from getting
 * stuck on screen if camera initialization is interrupted.
 */
function camHint(msg) {
  const hint = $('camHint');
  const msgEl = $('camHintMsg');
  if (!msg) {
    // Hide the overlay and clear previous text
    hint.style.display = 'none';
    if (msgEl) msgEl.textContent = '';
  } else {
    // Show the overlay and update the message
    hint.style.display = 'flex';
    if (msgEl) msgEl.textContent = msg;
  }
}
const lensBase = () => (lensIdx >= 0 && lenses[lensIdx] ? lenses[lensIdx].base : 1);

async function startCam() {
  const token = ++camToken;
  stopCam();
  camStarting = true;
  camHint('Starting camera…');
  // watchdog: iOS occasionally hangs a camera request forever — don't leave
  // the overlay stuck; let the user tap to trigger a fresh attempt
  setTimeout(() => {
    if (token === camToken && camStarting) { camStarting = false; camHint('Tap to start the camera.'); }
  }, 8000);
  try {
    const video = { width: { ideal: 1920 }, height: { ideal: 1080 } };
    if (lensIdx >= 0 && lenses[lensIdx]) video.deviceId = { exact: lenses[lensIdx].id };
    else video.facingMode = { ideal: 'environment' };
    let s;
    try {
      s = await navigator.mediaDevices.getUserMedia({ video, audio: false });
    } catch (e1) {
      // some iPhones refuse specific lenses/sizes — fall back to any camera at all
      s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }
    if (token !== camToken) { s.getTracks().forEach(t => t.stop()); return; }
    stream = s;
    videoTrack = s.getVideoTracks()[0];
    vid.srcObject = s;
    // iOS can block the preview from auto-playing (Low Power Mode etc.) even
    // though the camera works — play() failure is never fatal, any tap retries.
    vid.play().catch(() => {});
    await new Promise(res => {
      if (vid.readyState >= 2) return res();
      const t = setTimeout(res, 4000);
      vid.addEventListener('loadedmetadata', () => { clearTimeout(t); res(); }, { once: true });
    });
    if (token !== camToken) return;
    const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
    capsZoom = (caps.zoom && typeof caps.zoom.max === 'number') ? caps.zoom : null;
    camStarting = false;
    camHint('');
    applyZoom();
    discoverLenses();
  } catch (e) {
    if (token !== camToken) return;
    camStarting = false;
    const name = e && e.name ? e.name : '';
    camHint(name === 'NotAllowedError'
      ? 'Tap to start the camera.\nIf nothing happens: iPhone Settings → Apps → Safari → Camera → Allow, then reopen the app.'
      : name === 'NotFoundError'
      ? 'Your iPhone is hiding its cameras from this app.\n\n1. Settings → Screen Time → Content & Privacy Restrictions → Allowed Apps: Camera must be ON.\n2. Settings → Apps → Safari → Camera: set to Ask or Allow.\n3. Restart the iPhone, reopen this app, then tap here.'
      : 'Tap to start the camera' + (name ? ' (' + name + ')' : '') + '.');
  }
}
function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; videoTrack = null; capsZoom = null; }
}

/* Find the back lenses once permission is granted. Prefer Apple's combined
   multi-lens camera (it zooms below 1x natively, switching glass seamlessly);
   otherwise switch physical lenses (Ultra Wide / Wide / Telephoto) manually. */
let lensesProbed = false;
async function discoverLenses() {
  if (lensesProbed) return;
  lensesProbed = true;
  try {
    const cams = (await navigator.mediaDevices.enumerateDevices())
      .filter(d => d.kind === 'videoinput' && !/front/i.test(d.label));
    const backish = cams.filter(d => /back|rear|environment/i.test(d.label));
    const pool = backish.length ? backish : cams;
    const virt  = pool.find(d => /dual|triple/i.test(d.label));
    const ultra = pool.find(d => /ultra/i.test(d.label));
    const tele  = pool.find(d => /tele/i.test(d.label));
    const wide  = pool.find(d => !/ultra|tele|dual|triple/i.test(d.label));
    if (virt) {
      lenses = [{ id: virt.deviceId, label: virt.label, base: 1 }];
      lensIdx = 0;
      await startCam();
      if (capsZoom && capsZoom.min < 1) { updateChips(); return; }
      lenses = []; lensIdx = -1;   // combined camera can't go below 1x — fall back
    }
    const found = [];
    if (ultra) found.push({ id: ultra.deviceId, label: ultra.label, base: 0.5 });
    if (wide)  found.push({ id: wide.deviceId,  label: wide.label,  base: 1 });
    if (tele)  found.push({ id: tele.deviceId,  label: tele.label,  base: 3 });
    if (found.length > 1) {
      lenses = found;
      lensIdx = found.findIndex(l => l.base === 1);
      if (lensIdx < 0) lensIdx = 0;
      await startCam();
    }
    updateChips();
  } catch (e) { /* lens picker is optional */ }
}

function canHalf() {
  return lenses.some(l => l.base === 0.5) || !!(capsZoom && capsZoom.min < 1);
}
function minEff() { return canHalf() ? 0.5 : 1; }
function maxEff() {
  const topBase = lenses.length ? lenses[lenses.length - 1].base : 1;
  return Math.max(topBase * (capsZoom ? capsZoom.max : 6), 6);
}

function setEff(e, allowLensSwitch = true) {
  effZoom = clamp(e, minEff(), maxEff());
  if (allowLensSwitch && lenses.length > 1 && !camStarting) {
    let best = 0;
    for (let i = 0; i < lenses.length; i++) if (lenses[i].base <= effZoom + 0.001) best = i;
    if (best !== lensIdx) { lensIdx = best; startCam(); return; }
  }
  applyZoom();
}
function applyZoom() {
  const inner = effZoom / lensBase();
  let digital = inner;
  if (videoTrack && capsZoom) {
    const native = clamp(inner, capsZoom.min, capsZoom.max);
    videoTrack.applyConstraints({ advanced: [{ zoom: native }] }).catch(() => {});
    digital = inner / native;
  }
  digitalZoom = Math.max(1, digital);
  vid.style.transform = digitalZoom > 1.001 ? `scale(${digitalZoom})` : '';
  updateChips();
}
function fmtZoom(z) {
  const r = Math.round(z * 10) / 10;
  return r < 1 ? ('' + r).replace('0.', '.') : ('' + r).replace(/\.0$/, '');
}
function updateChips() {
  $('chipHalf').hidden = !canHalf();
  const active = effZoom < 0.95 ? 'chipHalf' : effZoom < 2.95 ? 'chipOne' : 'chipThree';
  for (const [id, label] of [['chipHalf', '.5'], ['chipOne', '1×'], ['chipThree', '3']]) {
    const b = $(id);
    b.classList.toggle('sel', id === active);
    b.textContent = id === active ? fmtZoom(effZoom) + '×' : label;
  }
}

function parseNote(t) {
  const s = t.trim();
  let m = s.match(/^(defects?|deffects?)\s*(picture|photo|pic)?\s*[,.:;\-]*\s*/i);
  if (m) return { cat: 'defect', note: s.slice(m[0].length) };
  m = s.match(/^general\s*(picture|photo|pic)?\s*[,.:;\-]*\s*/i);

function sanitize(s) {
  return (s || '').replace(/[\\/:*?"<>|#%{}$!'@+`=]/g, '').replace(/\s+/g, ' ').trim().slice(0, 60);
}
function fileNameFor(p, idx) {
  const n = sanitize(p.note) || 'photo';
  return String(idx).padStart(3, '0') + ' - ' + n + '.jpg';

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();

  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);

  for (const f of files) {
    const name = enc.encode(f.name);
    const crc = crc32(f.data);
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true); lh.setUint16(6, 0x0800, true);
    lh.setUint16(8, 0, true); lh.setUint16(10, dosTime, true); lh.setUint16(12, dosDate, true);
    lh.setUint32(14, crc, true); lh.setUint32(18, f.data.length, true); lh.setUint32(22, f.data.length, true);
    lh.setUint16(26, name.length, true); lh.setUint16(28, 0, true);
    parts.push(new Uint8Array(lh.buffer), name, f.data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true); ch.setUint16(4, 20, true); ch.setUint16(6, 20, true);
    ch.setUint16(8, 0x0800, true); ch.setUint16(10, 0, true); ch.setUint16(12, dosTime, true);
    ch.setUint16(14, dosDate, true); ch.setUint32(16, crc, true);
    ch.setUint32(20, f.data.length, true); ch.setUint32(24, f.data.length, true);
    ch.setUint16(28, name.length, true); ch.setUint32(42, offset, true);
    central.push(new Uint8Array(ch.buffer), name);
    offset += 30 + name.length + f.data.length;
  }
  let cdSize = 0;
  for (const c of central) cdSize += c.length;
  const end = new DataView(new ArrayBuffer(22));
  end.setUint32(0, 0x06054b50, true);
  end.setUint16(8, files.length, true); end.setUint16(10, files.length, true);
  end.setUint32(12, cdSize, true); end.setUint32(16, offset, true);

}

}
$('exportBtn').onclick = async () => {

    const dateStr = new Date().toISOString().slice(0, 10);
    const files = [];
    let report = `INSPECTION REPORT — ${prop}\nDate: ${new Date().toLocaleString()}\n`;
    for (const [folder, cat, label] of [['Defects', 'defect', 'DEFECTS'], ['General Photos', 'general', 'GENERAL PHOTOS']]) {
      const list = photos.filter(p => p.cat === cat).sort((a, b) => a.ts - b.ts);
      report += `\n========== ${label} (${list.length}) ==========\n`;
      let i = 1;
      for (const p of list) {
        const fname = fileNameFor(p, i);
        files.push({ name: folder + '/' + fname, data: new Uint8Array(await p.blob.arrayBuffer()) });
        report += `${String(i).padStart(3, '0')}. ${p.note || '(no note)'}  [${new Date(p.ts).toLocaleString()}]\n`;
        i++;
      }
    }
    files.push({ name: 'report.txt', data: new TextEncoder().encode(report) });
    const zip = buildZip(files);
    const zipName = `${prop} - ${dateStr}.zip`;
    const zipFile = new File([zip], zipName, { type: 'application/zip' });
    if (navigator.canShare && navigator.canShare({ files: [zipFile] })) {
      try { await navigator.share({ files: [zipFile], title: zipName }); }
      catch (e) { /* user cancelled the share sheet */ }
    } else {
      downloadBlob(zip, zipName);
    }
  } catch (e) {
    toast('Export failed: ' + e.message, true);
  }
  $('exportBtn').textContent = '⬇︎ ZIP';
};

/* ================= Drive Sync ================= */
// Google Drive OAuth client ID obtained from Google Cloud
const CLIENT_ID = '785011600208-7n60n10vpb9drt3fnur31ap111rgjkhh.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let driveAccessToken = null;
let driveConnected = false;

// Initialize the token client when needed
function initDriveOAuth() {
  if (tokenClient) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (tokenResponse) => {
      driveAccessToken = tokenResponse.access_token;
      driveConnected = true;
      // Update UI: change button label and disable sign-in
      const btn = $('googleDriveBtn');
      if (btn) {
        btn.textContent = 'Drive ✓';
        btn.disabled = true;
        btn.style.opacity = 0.7;
      }
      toast('Drive connected');
    }
  });
}

function connectDrive() {
  initDriveOAuth();
  // Request access token; avoid popup if already granted
  tokenClient.requestAccessToken({ prompt: '' });
}

async function createDriveFolder(name, parentId = null) {
  const metadata = { name: name, mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) metadata.parents = [parentId];
  const res = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + driveAccessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(metadata)
  });
  const data = await res.json();
  return data.id;
}

async function uploadBlobToDrive(blob, fileName, parentId) {
  const metadata = { name: fileName, parents: [parentId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', blob);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + driveAccessToken
    },
    body: form
  });
  return await res.json();
}

async function backupToDrive() {
  try {
    if (!driveConnected) {
      toast('Please connect to Drive first', true);
      return;
    }
    const propRaw = (localStorage.getItem('propName') || 'Inspection').trim();
    const propName = propRaw || 'Inspection';
    const dateStr = new Date().toISOString().slice(0, 10);
    const mainFolderId = await createDriveFolder(`${propName} - ${dateStr}`);
    const defectFolderId = await createDriveFolder('Defects', mainFolderId);
    const generalFolderId = await createDriveFolder('General Photos', mainFolderId);
    let iDef = 1, iGen = 1;
    for (const p of photos) {
      const idx = p.cat === 'defect' ? iDef : iGen;
      const notePart = (p.note || (p.cat === 'defect' ? 'defect' : 'general')).replace(/[^\w\s-]/g, '').trim() || (p.cat === 'defect' ? 'defect' : 'general');
      const fname = `${String(idx).padStart(3, '0')} - ${notePart}.jpg`;
      const folderId = p.cat === 'defect' ? defectFolderId : generalFolderId;
      await uploadBlobToDrive(p.blob, fname, folderId);
      if (p.cat === 'defect') iDef++; else iGen++;
    }
    toast('Backup to Drive complete');
  } catch (e) {
    toast('Drive backup failed: ' + (e && e.message ? e.message : e), true);
  }
}

// Attach event handlers for Drive buttons once DOM is ready
window.addEventListener('DOMContentLoaded', () => {
  const driveBtn = $('googleDriveBtn');
  if (driveBtn) driveBtn.onclick = connectDrive;
  const backupBtn = $('driveBackupBtn');
  if (backupBtn) backupBtn.onclick = backupToDrive;
});
